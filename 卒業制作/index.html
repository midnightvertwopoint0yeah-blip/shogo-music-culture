<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ホーム</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 30px;
    padding: 30px 0;
    background-color: #ccff66;

    opacity: 1;
    transition: opacity 0.5s ease; /* ← フェード用 */
  }

  body.fade-out {
    opacity: 0;
  }

  img {
    width: 80vw;
    max-width: 1000px;
    height: auto;
    border: 12px solid yellow;
    background-color: yellow;
    padding: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  a {
    font-size: 24px;
    font-weight: bold;
    color: #00bfff;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }
</style>

</head>

<body>
  <img src="ゼミ.png" alt="ゼミ">

  <a href="page2.html" onclick="fadeAndGo(event)">LOOPSTATIONコミュニティ</a>

<script>
function fadeAndGo(e) {
  e.preventDefault(); // すぐ遷移を止める
  document.body.classList.add('fade-out');

  setTimeout(function() {
    window.location.href = e.target.href;
  }, 500); // アニメーション時間と合わせる
}
</script>

</body>
</html>
